name: CI

on:
  pull_request:
    paths:
      - 'media-forge/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main, homolog]
    paths:
      - 'media-forge/**'

defaults:
  run:
    working-directory: media-forge

jobs:
  validate:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        # Node 22.x minimum: media-forge uses node:sqlite (built-in since 22.5+).
        # engines.node = >=22.5.0 in media-forge/package.json.
        node: [22.x]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: media-forge/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        # The Windows GitHub runner cannot bootstrap embedded-postgres (pg_ctl
        # fails to start a cluster), so the pg-backed integration suites throw at
        # collection ("Test Files: no tests" -> unhandled error) and there is no
        # runner-side fix. Typecheck/Lint/Build above already give authoritative
        # Windows signal (and our dev box is Windows). So the test step is
        # non-blocking on Windows ONLY; Ubuntu remains the authoritative test
        # gate. Do not "fix" this by making pg work on Windows — it can't.
        continue-on-error: ${{ matrix.os == 'windows-latest' }}
        run: pnpm test

      - name: Build
        run: pnpm exec tsup
