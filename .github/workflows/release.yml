name: Release

on:
  push:
    tags:
      - 'media-forge-v*'

defaults:
  run:
    working-directory: media-forge

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: media-forge/pnpm-lock.yaml

      - name: Install
        # --ignore-workspace: root pnpm-workspace.yaml lists media-forge as a
        # workspace package but the repo intentionally has no root pnpm-lock.yaml,
        # so without this flag pnpm resolves in workspace mode and fails with
        # ERR_PNPM_NO_LOCKFILE. Mirrors the same fix in ci.yml.
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Validate
        run: |
          pnpm typecheck
          pnpm lint
          pnpm test
          pnpm exec tsup

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/media-forge-v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: media-forge v${{ steps.version.outputs.version }}
          body: |
            See [CHANGELOG.md](./media-forge/CHANGELOG.md) for full release notes.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}

  docker:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - id: version
        run: echo "version=${GITHUB_REF#refs/tags/media-forge-v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: media-forge
          file: media-forge/Dockerfile
          # arm64-only: a VPS hospedada e arm64. O multi-arch (amd64+arm64 via QEMU)
          # travou >2h num build (era ~5min arm64-only). amd64 e so p/ agencia on-prem
          # x86 (C1 self-host) — build sob demanda em workflow proprio quando vender C1.
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/produtoramaxvision/media-forge-mcp:${{ steps.version.outputs.version }}
            ghcr.io/produtoramaxvision/media-forge-mcp:latest
