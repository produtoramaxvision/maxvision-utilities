name: Release

on:
  push:
    tags:
      - 'media-forge-v*'

defaults:
  run:
    working-directory: media-forge

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: media-forge/pnpm-lock.yaml

      - name: Install
        # --ignore-workspace: root pnpm-workspace.yaml lists media-forge as a
        # workspace package but the repo intentionally has no root pnpm-lock.yaml,
        # so without this flag pnpm resolves in workspace mode and fails with
        # ERR_PNPM_NO_LOCKFILE. Mirrors the same fix in ci.yml.
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Validate
        run: |
          pnpm typecheck
          pnpm lint
          pnpm test
          pnpm exec tsup

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/media-forge-v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: media-forge v${{ steps.version.outputs.version }}
          body: |
            See [CHANGELOG.md](./media-forge/CHANGELOG.md) for full release notes.
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}

  # Multi-arch via NATIVE runners (no QEMU). amd64 on ubuntu-latest, arm64 on
  # ubuntu-24.04-arm, each pushed BY DIGEST; docker-merge assembles the manifest.
  # QEMU multi-arch hung >2h once; native-per-arch is the docker-official robust
  # pattern. timeout-minutes caps any hang at 30min.
  docker-build:
    needs: release
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Prepare platform pair
        env:
          platform: ${{ matrix.platform }}
        run: echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/produtoramaxvision/media-forge-mcp
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: media-forge
          file: media-forge/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/produtoramaxvision/media-forge-mcp,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    needs: docker-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - id: version
        run: echo "version=${GITHUB_REF#refs/tags/media-forge-v}" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/produtoramaxvision/media-forge-mcp
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/produtoramaxvision/media-forge-mcp@sha256:%s ' *)
      - name: Inspect
        run: docker buildx imagetools inspect ghcr.io/produtoramaxvision/media-forge-mcp:${{ steps.version.outputs.version }}
