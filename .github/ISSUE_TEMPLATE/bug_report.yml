name: Bug report
description: Report a problem with the marketplace or a plugin (packaging, loading, CI — NOT skill content)
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Before submitting:** if the issue is about the *content* of a skill (instructions, code examples, factual errors), please report it upstream:
        - `n8n-skills/skills/...` → [czlonkowski/n8n-skills/issues](https://github.com/czlonkowski/n8n-skills/issues)
        - `gtm-skills/skills/...` → [paolobietolini/gtm-api-for-llms/issues](https://github.com/paolobietolini/gtm-api-for-llms/issues)
  - type: dropdown
    id: affected
    attributes:
      label: Affected component
      options:
        - "marketplace (install, marketplace.json)"
        - "n8n-skills (plugin packaging)"
        - "gtm-skills (plugin packaging)"
        - "CI / repo tooling"
        - "documentation"
        - "other"
    validations:
      required: true
  - type: input
    id: claude-code-version
    attributes:
      label: Claude Code version
      placeholder: "e.g., 2.1.89"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., Windows 11, macOS 14.5, Ubuntu 24.04"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Installed plugin via...
        2. Ran command...
        3. Saw error...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      render: shell
