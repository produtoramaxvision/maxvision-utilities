# media-forge-mcp — Swarm stack (MCP HTTP hospedado da forja de mídia)
#
# Espelha tiktok-mcp/linkedin-mcp: server na porta interna 3000, roteado pelo Traefik
# via rede `net`; Redis interno; billing delegado ao stack `credit-core` (carteira única).
# Secrets via env no Portainer — nunca neste arquivo.
#
# Deploy: Portainer → Stacks → Add stack (cole o YAML, defina env) ou
#         docker stack deploy -c media-forge-mcp.stack.yml media-forge-mcp
#
# IMAGEM: `media-forge-mcp` é publicada pelo build F-A (Dockerfile + ghcr). Enquanto não
# existir, `mcp-server` fica em ImagePull/retry; `mcp_redis` sobe normalmente.
#
# Pré-requisito: stack `credit-core` no ar (alias `credit-core` na rede `net`).
#
# Env vars a definir no Portainer:
#   MEDIA_FORGE_API_KEYS   chave(s) Bearer aceitas pelo MCP (F-A auth)
#   CREDIT_CORE_API_KEY    chave para falar com o credit-core
#   GOOGLE_API_KEY / GEMINI_API_KEY / FAL_KEY   chaves dos provedores de IA (server-side)
#   MASTER_KEY             chave mestra de criptografia (padrão da suíte)
#   MAXVISION_LICENSE_SERVER_URL   endpoint de validação de licença (C1)
#   MEDIA_FORGE_TAG        tag da imagem (default: latest)

version: "3.9"

services:
  mcp-server:
    image: ghcr.io/produtoramaxvision/media-forge-mcp:${MEDIA_FORGE_TAG:-latest}
    networks:
      - net        # Traefik alcança o server por aqui
      - internal
    environment:
      NODE_ENV: production
      TZ: America/Sao_Paulo
      LOG_LEVEL: info
      # F-A: o server HTTP lê MEDIA_FORGE_HTTP_PORT (default 8787); fixamos 3000 p/ casar com a suíte
      MEDIA_FORGE_HTTP_PORT: "3000"
      MCP_PORT: "3000"
      MEDIA_FORGE_API_KEYS: ${MEDIA_FORGE_API_KEYS}
      MCP_API_KEYS: ${MEDIA_FORGE_API_KEYS}
      REDIS_URL: redis://mcp_redis:6379
      # Billing: carteira compartilhada (stack credit-core) via rede `net`
      CREDIT_CORE_URL: http://credit-core:8080
      CREDIT_CORE_API_KEY: ${CREDIT_CORE_API_KEY}
      # Provedores de IA (chaves no server, como nos outros MCPs)
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FAL_KEY: ${FAL_KEY}
      # Licenciamento C1 (mesmo padrão do tiktok-mcp)
      LICENSE_CHECK_ENABLED: "true"
      MAXVISION_LICENSE_SERVER_URL: ${MAXVISION_LICENSE_SERVER_URL}
      MASTER_KEY: ${MASTER_KEY}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
      labels:
        - traefik.enable=true
        - traefik.docker.network=net
        - traefik.http.routers.media-forge.entrypoints=websecure
        - traefik.http.routers.media-forge.rule=Host(`media-forge.produtoramaxvision.com.br`)
        - traefik.http.routers.media-forge.tls=true
        - traefik.http.routers.media-forge.tls.certresolver=letsencryptresolver
        - traefik.http.services.media-forge.loadbalancer.server.port=3000

  mcp_redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    networks:
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  net:
    external: true
  internal:
    driver: overlay
