# media-forge-mcp — Swarm stack (MCP HTTP hospedado da forja de mídia)
#
# Contrato de env = SOMENTE o que o código consome (src/core/config.ts:loadConfig
# + auth de providers). Zero env morta. Secrets via env no Portainer — nunca no arquivo.
# Redeploy: Portainer (stack id 69) ou: docker stack deploy -c media-forge-mcp.stack.yml media-forge-mcp
#
# PREENCHER no Portainer (valores):
#   GOOGLE_API_KEY                    OBRIGATÓRIO p/ gerar (Google AI Studio). config.ts usa como apiKey.
#                                     Alias aceito: GEMINI_API_KEY (mesmo valor) — use só um.
#   ANTHROPIC_API_KEY                 opcional — review de qualidade via Claude (llm-judge)
#   MEDIA_FORGE_OCR_GOOGLE_VISION_KEY opcional — OCR no review (checar texto na imagem)
#   FAL_KEY                           opcional — Kling/Higgsfield/Seedance via fal.ai
#   BYTEPLUS_ARK_API_KEY              opcional — Seedance fallback (BytePlus ARK)
#   HF_API_KEY / HF_API_SECRET        opcional — Higgsfield direto
#   MEDIA_FORGE_API_KEYS              já setado — Bearer aceito pelo MCP (F-A auth)
#
# ADICIONADO EM F-B (2026-06-02):
#   MINIO_ENDPOINT                    OBRIGATÓRIO p/ entrega via signed URL (ex: https://s3.meuagente.api.br).
#                                     Sem ele, handlers caem no path local (disco efêmero) — degradação graciosa.
#   MINIO_REGION                      padrão: us-east-1
#   MINIO_BUCKET                      padrão: media-forge-outputs (bucket dedicado; ver provisão no plano F-B)
#   MINIO_ACCESS_KEY                  access key do service account media-forge-svc
#   MINIO_SECRET_KEY                  secret key do service account media-forge-svc
#   MINIO_USE_SSL                     padrão: true (config.ts lê; o endpoint já carrega o scheme)
#   MEDIA_FORGE_WEBHOOK_SECRET        HMAC secret para callbacks de provider (openssl rand -hex 32).
#                                     Sem ele, o endpoint /webhooks fica desabilitado.
#   MEDIA_FORGE_ARTIFACT_TTL_SECONDS  TTL signed URLs em segundos (padrão: 604800 = 7 dias)
#   MEDIA_FORGE_WEBHOOK_PUBLIC_URL    base pública dos callbacks. F-B: https://media-forge.produtoramaxvision.com.br/webhooks
#                                     Provider envia callback p/ {base}/{provider}/{job_id}.
#
# REMOVIDOS por não serem lidos pelo media-forge (evita env morta):
#   LOG_LEVEL (o lido é MEDIA_FORGE_LOG_LEVEL) · MCP_PORT · MCP_API_KEYS · REDIS_URL
#   MASTER_KEY · MAXVISION_LICENSE_SERVER_URL · LICENSE_CHECK_ENABLED
#   CREDIT_CORE_URL/CREDIT_CORE_API_KEY (billing entra no F-E) · serviço mcp_redis (sem consumidor até F-C)
#   GEMINI_API_KEY (alias redundante de GOOGLE_API_KEY)
#
# Pendências de feature (não são env, são fases): billing credit-core = F-E;
# rate-limit Redis cross-replica = F-C. Reintroduzir as envs correspondentes nessas fases.
#
# replicas: 1 mantido em F-B — o state de job (video_jobs SQLite) é single-replica.
# A chave de artefato (outputs/{job_id}.ext) é determinística (presign stateless),
# mas o job-state SQLite limita escala horizontal. Cross-replica → F-I.

version: "3.9"

services:
  mcp-server:
    image: ghcr.io/produtoramaxvision/media-forge-mcp:${MEDIA_FORGE_TAG:-latest}
    networks:
      - net
    environment:
      NODE_ENV: production
      TZ: America/Sao_Paulo
      MEDIA_FORGE_HTTP_PORT: "3000"
      MEDIA_FORGE_LOG_LEVEL: info
      MEDIA_FORGE_LOG_FORMAT: json
      # refs (imagens de referência) exigem MinIO+pgvector+Voyage, não provisionados → desliga
      MEDIA_FORGE_REFS_ENABLED: "false"
      MEDIA_FORGE_API_KEYS: ${MEDIA_FORGE_API_KEYS}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MEDIA_FORGE_OCR_GOOGLE_VISION_KEY: ${MEDIA_FORGE_OCR_GOOGLE_VISION_KEY}
      FAL_KEY: ${FAL_KEY}
      BYTEPLUS_ARK_API_KEY: ${BYTEPLUS_ARK_API_KEY}
      HF_API_KEY: ${HF_API_KEY}
      HF_API_SECRET: ${HF_API_SECRET}
      # F-B: entrega de artefato via MinIO/S3 (presigned URLs). Bucket dedicado: media-forge-outputs.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_BUCKET: ${MINIO_BUCKET:-media-forge-outputs}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-true}
      # F-B: webhook endpoint público para callbacks de provider.
      # Providers enviam callbacks para: https://media-forge.produtoramaxvision.com.br/webhooks/{provider}/{job_id}
      MEDIA_FORGE_WEBHOOK_SECRET: ${MEDIA_FORGE_WEBHOOK_SECRET}
      MEDIA_FORGE_WEBHOOK_PUBLIC_URL: ${MEDIA_FORGE_WEBHOOK_PUBLIC_URL:-https://media-forge.produtoramaxvision.com.br/webhooks}
      MEDIA_FORGE_ARTIFACT_TTL_SECONDS: ${MEDIA_FORGE_ARTIFACT_TTL_SECONDS:-604800}
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
      labels:
        - traefik.enable=true
        - traefik.docker.network=net
        - traefik.http.routers.media-forge.entrypoints=websecure
        - traefik.http.routers.media-forge.rule=Host(`media-forge.produtoramaxvision.com.br`)
        - traefik.http.routers.media-forge.tls=true
        - traefik.http.routers.media-forge.tls.certresolver=letsencryptresolver
        - traefik.http.services.media-forge.loadbalancer.server.port=3000

networks:
  net:
    external: true
